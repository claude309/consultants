<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homeland Consultant Dashboard</title>
<style>
:root{ color-scheme: light;
  --navy:#1f3864; --blue:#2e5496; --blue2:#4472c4; --ink:#1c2430; --muted:#69707d;
  --line:#e3e8ef; --bg:#f4f6fa; --card:#ffffff; --green:#2e7d4f; --greenbg:#e8f5ee;
  --amber:#b5790a; --amberbg:#fdf3df; --redbg:#fdecec; --red:#b03636; --chip:#eef2f8;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
.wrap{max-width:1180px;margin:0 auto;padding:18px 20px 60px}
header.top{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:14px}
h1{font-size:20px;margin:0 0 2px;color:var(--navy);letter-spacing:.2px}
.sub{color:var(--muted);font-size:12.5px}
.updated{font-size:11.5px;color:var(--muted);text-align:right;white-space:nowrap}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:6px 0 16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
.kpi .n{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi .l{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.4px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 15px;cursor:pointer;font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;font-size:13px}
.tab.active{color:var(--navy);background:var(--card);border-color:var(--line);position:relative;top:1px}
.panel{display:none}.panel.active{display:block}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:12px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px;border-top:3px solid var(--blue)}
.pcard h3{margin:0 0 10px;font-size:14.5px;color:var(--navy)}
.funnel{display:flex;gap:7px;flex-wrap:wrap}
.stage{flex:1 1 28%;min-width:64px;text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px;cursor:pointer;transition:background .12s,box-shadow .12s;position:relative}
.stage:hover{background:#eaf0f9;box-shadow:0 0 0 1px var(--blue2) inset}
.stage .v{font-size:19px;font-weight:700;color:var(--ink)}
.stage.s1 .v{color:var(--blue2)} .stage.s2 .v{color:var(--amber)} .stage.s3 .v{color:var(--green)}
.stage .k{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.stage .hint{font-size:8.5px;color:var(--blue2);margin-top:3px;opacity:0;transition:opacity .12s}
.stage:hover .hint{opacity:1}
.cov{margin-top:10px;font-size:12px;color:var(--muted)}
.cov b{color:var(--ink)}
.bar{height:6px;border-radius:4px;background:#eef1f6;margin-top:5px;overflow:hidden}
.bar > i{display:block;height:100%;background:var(--green)}
table{border-collapse:collapse;width:100%;background:var(--card)}
.matwrap{overflow:auto;max-height:70vh;border:1px solid var(--line);border-radius:10px}
.mat th,.mat td{border:1px solid var(--line);padding:6px 8px;font-size:11.5px;vertical-align:top}
.mat thead th{position:sticky;top:0;background:var(--navy);color:#fff;z-index:3;font-weight:600;text-align:center}
.mat tbody th{position:sticky;left:0;background:#f0f3f8;z-index:2;text-align:left;font-weight:600;min-width:165px}
.mat td{text-align:center;min-width:96px}
.mat td.has{background:var(--greenbg);color:var(--green);font-weight:600}
.mat td.gap{color:#c8cdd6}
.controls{display:flex;gap:10px;align-items:center;margin-bottom:11px;flex-wrap:wrap}
.controls input[type=text],.controls select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
.controls label{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer}
.mtable th,.mtable td{padding:8px 10px;border-bottom:1px solid var(--line);font-size:12.5px;text-align:left}
.mtable thead th{background:#f0f3f8;color:var(--navy);position:sticky;top:0;font-weight:600}
.chip{display:inline-block;background:var(--chip);color:var(--blue);border-radius:20px;padding:2px 9px;font-size:11px;margin:2px 3px 0 0;font-weight:600}
.tablecard{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:70vh}
.note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5}
.loading{padding:60px;text-align:center;color:var(--muted)}
.err{background:var(--redbg);color:var(--red);padding:12px 14px;border-radius:9px;border:1px solid #f3c6c6;font-size:13px}
.legend{font-size:11.5px;color:var(--muted);margin-top:8px}
.dot{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin:0 3px 0 9px}
.modal-overlay{position:fixed;inset:0;background:rgba(20,28,40,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:12px;max-width:640px;width:100%;box-shadow:0 18px 50px rgba(0,0,0,.25);overflow:hidden}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.modal-head h3{margin:0;font-size:16px;color:var(--navy)}
.modal-head .ms{font-size:12px;color:var(--muted);margin-top:3px}
.modal-x{cursor:pointer;border:none;background:var(--chip);color:var(--muted);width:30px;height:30px;border-radius:7px;font-size:17px;line-height:1;flex:none}
.modal-x:hover{background:#e1e7f1;color:var(--ink)}
.modal-body{padding:8px 18px 18px;max-height:62vh;overflow:auto}
.mcat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:13px 0 4px;font-weight:600}
.mrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
.mrow .nm{font-weight:600;color:var(--ink)}
.mrow .meta{font-size:11px;color:var(--muted)}
.flag{display:inline-block;border-radius:20px;padding:1px 8px;font-size:10.5px;font-weight:600;margin-left:5px}
.flag.on{background:var(--greenbg);color:var(--green)} .flag.off{background:#f1f3f7;color:#aab0bb}
.mempty{padding:24px 0;text-align:center;color:var(--muted);font-size:13px}
.mlink{color:var(--blue);font-weight:600;font-size:12px;text-decoration:none;white-space:nowrap}
.mlink:hover{text-decoration:underline}
@media(max-width:760px){.kpis{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>Homeland Group · Consultant Selection Dashboard</h1>
      <div class="sub">Live view — reads the published Google Sheet. Directory → Semi-Final pipeline.</div>
    </div>
    <div class="updated" id="updated"></div>
  </header>
  <div id="content"><div class="loading">Loading live data from the sheet…</div></div>
</div>

<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-head">
      <div><h3 id="modalTitle"></h3><div class="ms" id="modalSub"></div></div>
      <button class="modal-x" id="modalX" aria-label="Close">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ---- Published-to-web CSV sources (whole workbook shares one key; tabs differ by gid) ----
const PUB="https://docs.google.com/spreadsheets/d/e/2PACX-1vQrKhmQ8jNl1J4qPYPf26z83sY0IqDem_4dKk7zmO6mSCQ907WcIJcpx9829P0_uOTxT6SR_F6D_cNH/pub";
const DIR_URL = PUB+"?gid=1496981245&single=true&output=csv";  // Consultant directory
const SEMI_URL= PUB+"?gid=1621619574&single=true&output=csv";  // Semi-Final Consultants

const PROJECTS = [
  {key:"CP-Atelier",  label:"CP-Atelier"},
  {key:"HGP",         label:"HGP"},
  {key:"HLP",         label:"HLP"},
  {key:"YPS",         label:"YPS (Leisure Valley)"},
  {key:"Mulanpur",    label:"Mulanpur (Infinia)"},
  {key:"Dharampur",   label:"Dharampur (Vaana)"},
  {key:"Amritsar",    label:"Amritsar (Ranjit Ave)"},
  {key:"Goa-Saipem",  label:"Goa (Saipem)"},
  {key:"Goa-Pilerne", label:"Goa (Pilerne)"},
  {key:"Ludhiana",    label:"Ludhiana"},
];
function canon(s){
  const u=(s||"").toUpperCase();
  if(u.includes("CP-ATELIER")||u.includes("CP ATELIER")) return "CP-Atelier";
  if(u.includes("HGP")) return "HGP";
  if(u.includes("HLP")) return "HLP";
  if(u.includes("YPS")||u.includes("LEISURE")) return "YPS";
  if(u.includes("MULANPUR")||u.includes("MULLANPUR")||u.includes("INFINIA")) return "Mulanpur";
  if(u.includes("DHARMAPUR")||u.includes("DHARAMPUR")||u.includes("VAANA")) return "Dharampur";
  if(u.includes("AMRITSAR")||u.includes("RANJIT")) return "Amritsar";
  if(u.includes("SAIPEM")) return "Goa-Saipem";
  if(u.includes("PILERNE")) return "Goa-Pilerne";
  if(u.includes("LUDHIANA")) return "Ludhiana";
  return null;
}
const isTrue=v=>String(v).trim().toUpperCase()==="TRUE";
const clean=s=>String(s||"").replace(/\\?\[merged\\?\]/gi,"").trim();

// ---- CSV parser (handles quotes, commas, newlines) ----
function parseCSV(text){
  const rows=[]; let row=[], cur="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=""; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
async function fetchCSV(url){
  const r=await fetch(url,{cache:"no-store"});
  if(!r.ok) throw new Error("HTTP "+r.status+" fetching sheet");
  return parseCSV(await r.text());
}
// Find the header row (by test on the joined lowercased row) within a set of rows.
function headerRow(rows,test){ return rows.findIndex(r=>test(r.join("|").toLowerCase())); }

function buildModel(dirRows, pipeRows){
  const out={cats:[],master:[],coverage:{},candidates:{},invited:{},proposal:{},semi:{},finalized:{},pipeline:[]};
  PROJECTS.forEach(p=>{out.coverage[p.key]={};out.candidates[p.key]=0;out.invited[p.key]=0;out.proposal[p.key]=0;out.semi[p.key]=0;out.finalized[p.key]=0;});

  // ---- Directory ----
  const dh=headerRow(dirRows,s=>s.includes("consultant name"));
  if(dh>=0){
    const header=dirRows[dh];
    const idxCat=header.findIndex(h=>clean(h).toLowerCase()==="category");
    const idxCons=header.findIndex(h=>(h||"").toLowerCase().includes("consultant name"));
    const projCols=[];
    header.forEach((h,i)=>{ const pk=canon(h); if(pk && PROJECTS.some(p=>p.key===pk) && !projCols.some(c=>c.key===pk)) projCols.push({idx:i,key:pk}); });
    const cCat=idxCat>=0?idxCat:1, cCons=idxCons>=0?idxCons:2;
    let cat="";
    dirRows.slice(dh+1).forEach(r=>{
      const cc=clean(r[cCat]); if(cc) cat=cc;             // forward-fill merged category
      const consultant=clean(r[cCons]); if(!consultant) return;
      if(cat && !out.cats.includes(cat)) out.cats.push(cat);
      const onProjs=[];
      projCols.forEach(pc=>{
        if(isTrue(r[pc.idx])){
          const p=PROJECTS.find(x=>x.key===pc.key);
          onProjs.push(p.label); out.candidates[pc.key]++;
          (out.coverage[pc.key][cat]=out.coverage[pc.key][cat]||[]).push(consultant);
        }
      });
      out.master.push({cat,consultant,projects:onProjs});
    });
  }

  // ---- Semi-Final pipeline ----
  // Invitation Sent = checkbox; Proposal Received & LOI Finalized hold a link/attachment when done (blank otherwise).
  const ph=headerRow(pipeRows,s=>s.includes("consultant")&&s.includes("finaliz")&&
    (s.includes("mail sent")||s.includes("invitation")||s.includes("recommended by")));
  if(ph>=0){
    const h=pipeRows[ph].map(x=>(x||"").toLowerCase());
    const col=(...keys)=>h.findIndex(x=>keys.some(k=>x.includes(k)));
    const ci={ project:col("project"), category:col("category"), consultant:col("consultant"),
      invited:col("invitation","mail sent","recommended"), proposal:col("proposal received","proposal"),
      meeting:col("meeting"), loi:col("loi") };
    const at=(r,i)=> i>=0 ? r[i] : "";
    const hasContent=v=>{const s=clean(v);return s!=="" && !["FALSE","NA","NO","-","0"].includes(s.toUpperCase());};
    let curCat="", curProj="";
    pipeRows.slice(ph+1).forEach(r=>{
      const proj=clean(at(r,ci.project))||curProj; curProj=proj;
      const cons=clean(at(r,ci.consultant));
      if(!proj||!cons) return;
      const cat=clean(at(r,ci.category))||curCat; curCat=cat;
      const pk=canon(proj);
      const invited=isTrue(at(r,ci.invited));            // Invitation Sent (checkbox)
      const propVal=clean(at(r,ci.proposal)), loiVal=clean(at(r,ci.loi));
      const proposalDone=hasContent(propVal);            // Proposal Received (link/attachment)
      const loiDone=hasContent(loiVal);                  // LOI Finalized (link/attachment) = finalized
      out.pipeline.push({project:proj,pk,category:cat,consultant:cons,mail:invited,
        proposal:proposalDone,proposalLink:proposalDone?propVal:"",
        meeting:isTrue(at(r,ci.meeting)),loi:loiDone,loiLink:loiDone?loiVal:"",finalize:loiDone});
      if(pk){ if(invited) out.invited[pk]++; if(proposalDone) out.proposal[pk]++; if(loiDone) out.finalized[pk]++; }
    });
  }
  return out;
}

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

function render(d){
  const root=document.getElementById("content"); root.innerHTML="";
  document.getElementById("updated").textContent="Live · loaded "+new Date().toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"});

  const totShort=Object.values(d.candidates).reduce((a,b)=>a+b,0);
  const totInvited=Object.values(d.invited).reduce((a,b)=>a+b,0);
  const totFinal=Object.values(d.finalized).reduce((a,b)=>a+b,0);
  const kpis=[[PROJECTS.length,"Projects"],[d.cats.length,"Categories"],[d.master.length,"Candidate firms"],
    [totShort,"Shortlist ticks"],[totInvited,"Invitations sent"],[totFinal,"Finalized"]];
  const kwrap=el("div","kpis");
  kpis.forEach(k=>kwrap.appendChild(el("div","kpi",`<div class="n">${k[0]}</div><div class="l">${k[1]}</div>`)));
  root.appendChild(kwrap);

  const tabs=el("div","tabs"); const panels=el("div");
  const defs=[["Overview","ov"],["Coverage matrix","cov"],["Master list","mas"]];
  defs.forEach((t,i)=>{
    const tb=el("div","tab"+(i===0?" active":""),t[0]);
    tb.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
      tb.classList.add("active"); document.getElementById("p-"+t[1]).classList.add("active");};
    tabs.appendChild(tb);
  });
  root.appendChild(tabs); root.appendChild(panels);

  // Overview
  const pov=el("div","panel active"); pov.id="p-ov";
  const cg=el("div","grid-cards");
  PROJECTS.forEach(p=>{
    const sh=d.candidates[p.key], iv=d.invited[p.key], pr=d.proposal[p.key], fi=d.finalized[p.key];
    const covCats=Object.keys(d.coverage[p.key]).length;
    const pct=d.cats.length?Math.round(covCats/d.cats.length*100):0;
    const card=el("div","pcard");
    card.innerHTML=`<h3>${p.label}</h3>
      <div class="funnel">
        <div class="stage s1" data-stage="shortlisted"><div class="v">${sh}</div><div class="k">Shortlisted</div><div class="hint">view ▸</div></div>
        <div class="stage s2" data-stage="invited"><div class="v">${iv}</div><div class="k">Invitation Sent</div><div class="hint">view ▸</div></div>
        <div class="stage s2" data-stage="proposal"><div class="v">${pr}</div><div class="k">Proposal Received</div><div class="hint">view ▸</div></div>
        <div class="stage s3" data-stage="final"><div class="v">${fi}</div><div class="k">Finalized</div><div class="hint">view ▸</div></div>
      </div>
      <div class="cov"><b>${covCats}</b> of ${d.cats.length} categories have a pick
        <div class="bar"><i style="width:${pct}%"></i></div></div>`;
    card.querySelectorAll(".stage").forEach(st=>{ st.onclick=()=>openStage(d,p,st.dataset.stage); });
    cg.appendChild(card);
  });
  pov.appendChild(cg); panels.appendChild(pov);

  // Coverage matrix
  const pc=el("div","panel"); pc.id="p-cov";
  const ctrl=el("div","controls");
  ctrl.innerHTML=`<label><input type="checkbox" id="hideEmpty" checked> Hide categories with no picks anywhere</label>
    <span class="legend"><span class="dot" style="background:var(--greenbg);border:1px solid #bfe3cd"></span>has a pick
    <span class="dot" style="background:#fff;border:1px solid var(--line)"></span>gap</span>`;
  pc.appendChild(ctrl);
  const mw=el("div","matwrap"); const tbl=el("table","mat");
  const thead=el("thead"); let hr="<tr><th>Category</th>"; PROJECTS.forEach(p=>hr+=`<th>${p.label}</th>`); hr+="</tr>";
  thead.innerHTML=hr; tbl.appendChild(thead);
  const tb=el("tbody"); tbl.appendChild(tb);
  function drawMatrix(hideEmpty){
    tb.innerHTML="";
    d.cats.forEach(cat=>{
      const any=PROJECTS.some(p=>(d.coverage[p.key][cat]||[]).length);
      if(hideEmpty&&!any) return;
      let row=`<th>${cat}</th>`;
      PROJECTS.forEach(p=>{ const names=d.coverage[p.key][cat]||[];
        row+= names.length ? `<td class="has">${names.join("<br>")}</td>` : `<td class="gap">—</td>`; });
      tb.appendChild(el("tr",null,row));
    });
  }
  drawMatrix(true);
  pc.appendChild(mw); mw.appendChild(tbl); panels.appendChild(pc);
  ctrl.querySelector("#hideEmpty").onchange=e=>drawMatrix(e.target.checked);

  // Master list
  const pm=el("div","panel"); pm.id="p-mas";
  const mc=el("div","controls");
  const catOpts=["All categories"].concat(d.cats).map(c=>`<option>${c}</option>`).join("");
  mc.innerHTML=`<input type="text" id="msearch" placeholder="Search consultant…" style="min-width:220px">
    <select id="mcat">${catOpts}</select>
    <select id="mproj"><option>All projects</option>${PROJECTS.map(p=>`<option>${p.label}</option>`).join("")}</select>
    <span class="legend" id="mcount"></span>`;
  pm.appendChild(mc);
  const tc=el("div","tablecard"); const mt=el("table","mtable");
  mt.innerHTML=`<thead><tr><th>Category</th><th>Consultant</th><th>Selected for (projects)</th></tr></thead><tbody></tbody>`;
  tc.appendChild(mt); pm.appendChild(tc); panels.appendChild(pm);
  const mbody=mt.querySelector("tbody");
  function drawMaster(){
    const q=(document.getElementById("msearch").value||"").toLowerCase();
    const fc=document.getElementById("mcat").value, fp=document.getElementById("mproj").value;
    mbody.innerHTML=""; let n=0;
    d.master.forEach(r=>{
      if(q&&!r.consultant.toLowerCase().includes(q)) return;
      if(fc!=="All categories"&&r.cat!==fc) return;
      if(fp!=="All projects"&&!r.projects.includes(fp)) return;
      n++;
      const chips=r.projects.length?r.projects.map(p=>`<span class="chip">${p}</span>`).join(""):'<span style="color:#c8cdd6">— none yet —</span>';
      mbody.appendChild(el("tr",null,`<td style="color:var(--muted)">${r.cat}</td><td style="font-weight:600">${r.consultant}</td><td>${chips}</td>`));
    });
    document.getElementById("mcount").textContent=n+" firms";
  }
  drawMaster();
  ["msearch","mcat","mproj"].forEach(id=>{const e=document.getElementById(id);e.oninput=drawMaster;e.onchange=drawMaster;});
}

// ---- stage detail modal ----
function flag(on,label){ return `<span class="flag ${on?'on':'off'}">${label}</span>`; }
function linkCell(v,label){
  if(!v) return '<span style="color:#c8cdd6">—</span>';
  if(/^https?:\/\//i.test(v)) return `<a href="${v}" target="_blank" rel="noopener" class="mlink">${label} ▸</a>`;
  return `<span style="font-size:12px">${v}</span>`;
}
function openStage(d,p,stage){
  const titleMap={shortlisted:"Shortlisted",invited:"Invitation Sent",proposal:"Proposal Received",semi:"Semi-final",final:"Finalized"};
  const subMap={ shortlisted:"Consultants ticked for this project in the directory",
    invited:"Consultants whose invitation (mail) has been sent",
    proposal:"Consultants who have submitted a proposal",
    semi:"Consultants whose invitation (mail) has been sent", final:"Consultants marked to finalize" };
  const emptyMap={ invited:`No invitations sent for ${p.label} yet.`,
    proposal:`No proposals received for ${p.label} yet.`,
    semi:`No invitations sent for ${p.label} yet.`, final:`No consultants finalized for ${p.label} yet.` };
  let body="";
  if(stage==="shortlisted"){
    const cats=d.cats.filter(c=>(d.coverage[p.key][c]||[]).length);
    if(!cats.length){ body=`<div class="mempty">No shortlisted consultants for ${p.label} yet.</div>`; }
    else cats.forEach(c=>{ body+=`<div class="mcat">${c}</div>`;
      (d.coverage[p.key][c]||[]).forEach(nm=>{ body+=`<div class="mrow"><span class="nm">${nm}</span></div>`; }); });
  } else {
    let rows=d.pipeline.filter(r=>r.pk===p.key);
    if(stage==="invited"||stage==="semi") rows=rows.filter(r=>r.mail);
    if(stage==="proposal") rows=rows.filter(r=>r.proposal);
    if(stage==="final") rows=rows.filter(r=>r.finalize);
    if(!rows.length){
      body=`<div class="mempty">${emptyMap[stage]||"Nothing to show yet."}</div>`;
    } else {
      rows.forEach(r=>{
        let right;
        if(stage==="proposal") right=linkCell(r.proposalLink,"View proposal");
        else if(stage==="final") right=linkCell(r.loiLink,"View LOI");
        else right=flag(r.mail,"Invited")+flag(r.proposal,"Proposal")+flag(r.meeting,"Meeting")+flag(r.finalize,"Finalized");
        body+=`<div class="mrow"><span><span class="nm">${r.consultant}</span><div class="meta">${r.category||""}</div></span><span>${right}</span></div>`;
      });
    }
  }
  document.getElementById("modalTitle").textContent=`${p.label} — ${titleMap[stage]}`;
  document.getElementById("modalSub").textContent=subMap[stage];
  document.getElementById("modalBody").innerHTML=body;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
document.getElementById("modalX").onclick=closeModal;
document.getElementById("modal").onclick=e=>{ if(e.target.id==="modal") closeModal(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

async function load(){
  try{
    const dir=await fetchCSV(DIR_URL);
    let pipe=[], semiErr=false;
    try{ pipe=await fetchCSV(SEMI_URL); }catch(_){ semiErr=true; }
    render(buildModel(dir,pipe));
    if(semiErr){
      const n=el("div","err","Semi-Final data couldn't load — publish the <b>Semi Final Consultants</b> tab to web as CSV (or publish the Entire document). Shortlisted still shows from the Directory; Invitation Sent / Proposal Received / Semi-final / Finalized read 0 until then.");
      n.style.marginTop="14px"; document.getElementById("content").appendChild(n);
    }
  }catch(e){
    document.getElementById("content").innerHTML='<div class="err">Could not load the published Directory sheet: '+
      (e&&e.message?e.message:e)+'<br><br>Make sure the Consultant directory tab is Published to web as CSV.</div>';
  }
}
load();
</script>
</body>
</html>
